<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Kaffe - Category Form')}"></head>
<body class="bg-amber-50 min-h-screen text-gray-800">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mx-auto max-w-3xl px-4 py-10">
    <div class="mb-6 flex items-center justify-between">
        <h1 class="text-3xl font-bold text-amber-900" th:text="${pageTitle}">Category Form</h1>
        <a href="/categories" class="text-sm font-semibold text-amber-800 hover:underline">Back to Categories</a>
    </div>

    <div th:if="${error}" class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-800" th:text="${error}"></div>

    <form th:action="@{/categories}" method="post" th:object="${category}"
          class="space-y-5 rounded-xl border border-amber-200 bg-white p-6 shadow-sm">

        <input type="hidden" th:if="${category.uniqueId != null}" th:field="*{uniqueId}" />

        <div>
            <label for="name" class="mb-1 block text-sm font-semibold text-amber-900">Category Name *</label>
            <input id="name"
                   type="text"
                   th:field="*{name}"
                   required
                   maxlength="100"
                   placeholder="e.g., Espresso, Cold Brew"
                   class="w-full rounded-lg border border-amber-200 px-3 py-2 focus:border-amber-600 focus:outline-none" />
            <p class="mt-1 text-xs text-gray-500">Enter category name (max 100 characters)</p>
        </div>

        <div>
            <label for="description" class="mb-1 block text-sm font-semibold text-amber-900">Description</label>
            <textarea id="description"
                      th:field="*{description}"
                      rows="4"
                      maxlength="500"
                      placeholder="Describe this category..."
                      class="w-full rounded-lg border border-amber-200 px-3 py-2 focus:border-amber-600 focus:outline-none"></textarea>
            <p class="mt-1 text-xs text-gray-500">Optional description (max 500 characters)</p>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit"
                    class="rounded-lg bg-amber-800 px-5 py-2.5 font-semibold text-white hover:bg-amber-900"
                    th:text="${category.uniqueId == null} ? 'Create Category' : 'Update Category'">
                Save
            </button>
            <a href="/categories"
               class="rounded-lg border border-amber-300 px-5 py-2.5 font-semibold text-amber-800 hover:bg-amber-100">
                Cancel
            </a>
        </div>
    </form>
</main>
</body>
</html>
