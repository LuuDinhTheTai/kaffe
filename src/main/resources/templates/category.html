<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Kaffe - Category Detail')}"></head>
<body class="bg-amber-50 min-h-screen text-gray-800">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mx-auto px-4 py-10">
    <div class="mb-8 rounded-xl border border-amber-200 bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
            <div>
                <p class="text-xs uppercase tracking-wide text-amber-700">Category Detail</p>
                <h1 class="text-3xl font-bold text-amber-900" th:text="${category.name}">Category Name</h1>
                <p class="mt-3 text-sm text-gray-700" th:text="${category.description != null && !category.description.isBlank() ? category.description : 'No description provided.'}"></p>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="/categories" class="rounded-md border border-amber-300 px-4 py-2 text-sm font-semibold text-amber-900 hover:bg-amber-100">Back</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/{id}/edit(id=${category.uniqueId})}" class="rounded-md bg-amber-700 px-4 py-2 text-sm font-semibold text-white hover:bg-amber-800">Edit</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/{id}/delete(id=${category.uniqueId})}" onclick="return confirm('Delete this category?')" class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">Delete</a>
            </div>
        </div>
    </div>

    <section class="space-y-4">
        <div class="flex items-center justify-between">
            <h2 class="text-2xl font-bold text-amber-900">Products in this category</h2>
            <a sec:authorize="hasRole('ADMIN')" href="/products/new" class="rounded-md bg-amber-800 px-4 py-2 text-sm font-semibold text-white hover:bg-amber-900">+ Add Product</a>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="rounded-xl border border-amber-200 bg-white p-8 text-center shadow-sm">
            <p class="font-semibold text-amber-900">No products in this category yet.</p>
        </div>

        <div th:if="${!#lists.isEmpty(products)}" class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
            <article th:each="product : ${products}" class="rounded-xl border border-amber-200 bg-white p-5 shadow-sm">
                <h3 class="text-lg font-bold text-amber-900" th:text="${product.name}"></h3>
                <p class="mt-1 text-xs text-gray-500">SKU: <span th:text="${product.sku}"></span></p>
                <p class="mt-3 text-sm text-gray-700" th:text="${product.description != null && !product.description.isBlank() ? product.description : 'No description'}"></p>
                <div class="mt-4 flex gap-2">
                    <a th:href="@{/products/{id}(id=${product.uniqueId})}" class="rounded-md border border-amber-300 px-3 py-2 text-xs font-semibold text-amber-900 hover:bg-amber-100">View</a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/{id}/edit(id=${product.uniqueId})}" class="rounded-md bg-amber-700 px-3 py-2 text-xs font-semibold text-white hover:bg-amber-800">Edit</a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/{id}/delete(id=${product.uniqueId})}" onclick="return confirm('Delete this product?')" class="rounded-md bg-red-600 px-3 py-2 text-xs font-semibold text-white hover:bg-red-700">Delete</a>
                </div>
            </article>
        </div>
    </section>
</main>
</body>
</html>
