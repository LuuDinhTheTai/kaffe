<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Kaffe - Register')}"></head>
<body class="bg-amber-50 min-h-screen font-sans text-gray-800 flex items-center justify-center">

    <div class="w-full max-w-md mx-auto px-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="text-5xl font-bold italic text-amber-900 tracking-wider inline-flex items-center gap-3">
                ☕ Kaffe
            </a>
            <p class="text-gray-500 mt-2">Create your account</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-amber-100">

            <!-- Error Alert -->
            <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <span th:text="${error}">Error message</span>
            </div>

            <!-- Register Form -->
            <form th:action="@{/register}" method="post" class="space-y-5">
                <div>
                    <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required autofocus
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition placeholder-gray-400"
                           placeholder="Enter your full name"/>
                </div>

                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition placeholder-gray-400"
                           placeholder="Choose a username"/>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition placeholder-gray-400"
                           placeholder="Create a password"/>
                </div>

                <div>
                    <label for="number" class="block text-sm font-semibold text-gray-700 mb-1.5">Phone Number <span class="text-gray-400 font-normal">(optional)</span></label>
                    <input type="text" id="number" name="number"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition placeholder-gray-400"
                           placeholder="Enter your phone number"/>
                </div>

                <button type="submit"
                        class="w-full bg-amber-800 hover:bg-amber-900 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition duration-300 ease-in-out transform hover:-translate-y-0.5">
                    Create Account
                </button>
            </form>

            <!-- Link to Login -->
            <div class="mt-6 text-center text-sm text-gray-600">
                Already have an account?
                <a href="/login" class="text-amber-700 hover:text-amber-900 font-semibold transition">Sign in</a>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="/" class="text-amber-700 hover:text-amber-900 font-medium transition">
                ← Back to Home
            </a>
        </div>
    </div>

</body>
</html>
