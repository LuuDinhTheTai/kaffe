<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Kaffe - Product Management')}"></head>
<body class="bg-amber-50 min-h-screen text-gray-800">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mx-auto px-4 py-10">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
        <h1 class="text-3xl font-bold text-amber-900">Product Management</h1>
        <a sec:authorize="hasRole('ADMIN')" href="/products/new" class="inline-flex items-center justify-center rounded-lg bg-amber-800 px-5 py-2.5 font-semibold text-white hover:bg-amber-900">
            + Add Product
        </a>
    </div>

    <div th:if="${param.success}" class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-800">
        Product action completed successfully.
    </div>
    <div th:if="${param.error}" class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-800" th:text="${param.error}"></div>

    <div th:if="${#lists.isEmpty(products)}" class="rounded-xl border border-amber-200 bg-white p-10 text-center">
        <p class="text-lg font-semibold text-amber-900">No products yet.</p>
        <p class="mt-2 text-sm text-gray-600">Create your first product to populate the menu.</p>
    </div>

    <div th:if="${!#lists.isEmpty(products)}" class="overflow-x-auto rounded-xl border border-amber-200 bg-white shadow-sm">
        <table class="min-w-full text-sm">
            <thead class="bg-amber-900 text-white">
            <tr>
                <th class="px-4 py-3 text-left">Name</th>
                <th class="px-4 py-3 text-left">SKU</th>
                <th class="px-4 py-3 text-left">Category</th>
                <th class="px-4 py-3 text-left">Size</th>
                <th class="px-4 py-3 text-left">Image</th>
                <th class="px-4 py-3 text-right">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}" class="border-b last:border-b-0 hover:bg-amber-50/50">
                <td class="px-4 py-3 font-medium" th:text="${product.name}"></td>
                <td class="px-4 py-3" th:text="${product.sku}"></td>
                <td class="px-4 py-3" th:text="${product.category != null ? product.category.name : '-'}"></td>
                <td class="px-4 py-3" th:text="${product.size != null && !product.size.isBlank() ? product.size : '-'}"></td>
                <td class="px-4 py-3">
                    <a th:if="${product.image != null && !product.image.isBlank()}" th:href="${product.image}" target="_blank" class="text-amber-800 hover:underline">View</a>
                    <span th:if="${product.image == null || product.image.isBlank()}">-</span>
                </td>
                <td class="px-4 py-3">
                    <div class="flex justify-end gap-2">
                        <a th:href="@{/products/{id}(id=${product.uniqueId})}" class="rounded-md border border-amber-300 px-3 py-1.5 text-xs font-semibold text-amber-900 hover:bg-amber-100">View</a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/{id}/edit(id=${product.uniqueId})}" class="rounded-md bg-amber-700 px-3 py-1.5 text-xs font-semibold text-white hover:bg-amber-800">Edit</a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/{id}/delete(id=${product.uniqueId})}" onclick="return confirm('Delete this product?')" class="rounded-md bg-red-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-red-700">Delete</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
