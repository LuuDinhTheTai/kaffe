<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Kaffe - Product Detail')}"></head>
<body class="bg-amber-50 min-h-screen text-gray-800">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mx-auto max-w-4xl px-4 py-10">
    <article class="rounded-xl border border-amber-200 bg-white p-6 shadow-sm">
        <div class="mb-6 flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
            <div>
                <p class="text-xs uppercase tracking-wide text-amber-700">Product Detail</p>
                <h1 class="text-3xl font-bold text-amber-900" th:text="${product.name}">Product Name</h1>
                <p class="mt-2 text-sm text-gray-600">
                    <span class="font-semibold">Category:</span>
                    <a th:if="${product.category != null}" th:href="@{/categories/{id}(id=${product.category.uniqueId})}" th:text="${product.category.name}" class="text-amber-800 hover:underline"></a>
                    <span th:if="${product.category == null}">-</span>
                </p>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="/products" class="rounded-md border border-amber-300 px-4 py-2 text-sm font-semibold text-amber-900 hover:bg-amber-100">Back</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/{id}/edit(id=${product.uniqueId})}" class="rounded-md bg-amber-700 px-4 py-2 text-sm font-semibold text-white hover:bg-amber-800">Edit</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/{id}/delete(id=${product.uniqueId})}" onclick="return confirm('Delete this product?')" class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">Delete</a>
            </div>
        </div>

        <dl class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div class="rounded-lg border border-amber-100 bg-amber-50 p-4">
                <dt class="text-xs font-semibold uppercase tracking-wide text-amber-700">SKU</dt>
                <dd class="mt-1 text-sm text-gray-800" th:text="${product.sku != null && !product.sku.isBlank() ? product.sku : '-'}"></dd>
            </div>
            <div class="rounded-lg border border-amber-100 bg-amber-50 p-4">
                <dt class="text-xs font-semibold uppercase tracking-wide text-amber-700">Size</dt>
                <dd class="mt-1 text-sm text-gray-800" th:text="${product.size != null && !product.size.isBlank() ? product.size : '-'}"></dd>
            </div>
            <div class="rounded-lg border border-amber-100 bg-amber-50 p-4 md:col-span-2">
                <dt class="text-xs font-semibold uppercase tracking-wide text-amber-700">Description</dt>
                <dd class="mt-1 text-sm text-gray-800" th:text="${product.description != null && !product.description.isBlank() ? product.description : 'No description provided.'}"></dd>
            </div>
            <div class="rounded-lg border border-amber-100 bg-amber-50 p-4 md:col-span-2">
                <dt class="text-xs font-semibold uppercase tracking-wide text-amber-700">Image</dt>
                <dd class="mt-1 text-sm text-gray-800">
                    <a th:if="${product.image != null && !product.image.isBlank()}" th:href="${product.image}" target="_blank" class="text-amber-800 hover:underline">Open image URL</a>
                    <span th:if="${product.image == null || product.image.isBlank()}">No image URL</span>
                </dd>
            </div>
        </dl>
    </article>
</main>
</body>
</html>
